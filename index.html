<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 GatoFinance — Controle de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #f5c842;
    --accent2: #ff6b6b;
    --accent3: #6bcbf5;
    --accent4: #a78bfa;
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --green: #4ade80;
    --red: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s ease;
  }

  .sidebar-logo {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .sidebar-logo p { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .sidebar-nav {
    padding: 20px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 8px 12px 4px;
    margin-top: 8px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    background: transparent;
    border: none;
    color: var(--text2);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: rgba(245,200,66,0.12); color: var(--accent); }
  .nav-btn .icon { font-size: 18px; width: 24px; text-align: center; }

  /* MAIN */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .topbar-actions { display: flex; gap: 10px; }

  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .btn-primary { background: var(--accent); color: #0f0f13; }
  .btn-primary:hover { background: #ffd95c; transform: translateY(-1px); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .btn-danger:hover { background: rgba(248,113,113,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

  /* CONTENT */
  .content { padding: 32px; flex: 1; }

  /* CARDS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .stat-card.yellow::before { background: var(--accent); }
  .stat-card.red::before { background: var(--accent2); }
  .stat-card.blue::before { background: var(--accent3); }
  .stat-card.purple::before { background: var(--accent4); }
  .stat-card.green::before { background: var(--green); }

  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  /* CARDS LIST */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .credit-card {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .credit-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

  .credit-card::after {
    content: '💳';
    position: absolute;
    right: -10px;
    bottom: -10px;
    font-size: 80px;
    opacity: 0.05;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .card-actions { display: flex; gap: 6px; }

  .card-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  .card-info-item label { font-size: 10px; color: var(--text3); display: block; margin-bottom: 2px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .card-info-item span { font-size: 13px; font-weight: 500; }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .progress-fill.low { background: var(--green); }
  .progress-fill.mid { background: var(--accent); }
  .progress-fill.high { background: var(--red); }

  .card-progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  .card-spent { font-size: 20px; font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 4px; }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-filters {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--surface2);
    padding: 12px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 14px 20px;
    font-size: 14px;
    vertical-align: middle;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .tag.installment { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.3); color: var(--accent4); }

  .person-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
  }

  .amount-cell {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(10px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-group select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* FILTER INPUT */
  .filter-input {
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    min-width: 140px;
  }

  .filter-input:focus { border-color: var(--accent); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty p { font-size: 14px; }

  /* CATEGORIES */
  .cat-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 13px;
    transition: all 0.15s;
  }

  .cat-item button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: var(--text3);
    padding: 0;
    transition: color 0.1s;
  }

  .cat-item button:hover { color: var(--red); }

  /* PEOPLE */
  .people-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .person-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 13px;
  }

  .person-item button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: var(--text3);
    padding: 0;
    transition: color 0.1s;
  }

  .person-item button:hover { color: var(--red); }

  /* CHART AREA */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  .bar-row {
    display: grid;
    grid-template-columns: 130px 1fr 80px;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .bar-label { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  .bar-amount {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-nav span {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    min-width: 130px;
    text-align: center;
  }

  /* COLOR DOT */
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  /* TOGGLE */
  .views-tabs {
    display: flex;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
  }

  .view-tab {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .view-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* MOBILE */
  .menu-toggle {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    font-size: 18px;
    color: var(--text);
  }

  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .main {
      margin-left: 0;
    }
    .menu-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content {
      padding: 20px;
    }
    .form-row {
      grid-template-columns: 1fr;
    }
    .stats-grid {
      grid-template-columns: 1fr 1fr;
    }
    .bar-row {
      grid-template-columns: 90px 1fr 70px;
    }
    .overlay-bg {
      display: block !important;
    }
  }

  .overlay-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  @keyframes slideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .no-data-row td { text-align: center; padding: 40px; color: var(--text3); }

  input[type="color"] {
    width: 36px;
    height: 36px;
    padding: 2px;
    border-radius: 6px;
    cursor: pointer;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-row input[type="text"] {
    flex: 1;
  }

  .add-inline {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .add-inline input {
    flex: 1;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }

  .add-inline input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<div class="overlay-bg" id="overlayBg" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>🐱 GatoFinance</h1>
    <p>Controle de gastos familiar</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Visão Geral</div>
    <button class="nav-btn active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="icon">📊</span> Dashboard
    </button>
    <button class="nav-btn" onclick="showPage('expenses')" id="nav-expenses">
      <span class="icon">💸</span> Gastos
    </button>

    <div class="nav-section-label">Gerenciar</div>
    <button class="nav-btn" onclick="showPage('cards')" id="nav-cards">
      <span class="icon">💳</span> Cartões
    </button>
    <button class="nav-btn" onclick="showPage('people')" id="nav-people">
      <span class="icon">👥</span> Pessoas
    </button>
    <button class="nav-btn" onclick="showPage('categories')" id="nav-categories">
      <span class="icon">🏷️</span> Categorias
    </button>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="pageContent"></div>
</main>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <div id="modalContent"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===================== DATA =====================
let data = {
  cards: [],
  people: [],
  categories: [],
  expenses: []
};

const COLORS = ['#f5c842','#ff6b6b','#6bcbf5','#a78bfa','#4ade80','#fb923c','#f472b6','#34d399'];

function load() {
  const saved = localStorage.getItem('gatofinance');
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) {}
  }
  // defaults
  if (!data.people?.length) {
    data.people = [
      { id: uid(), name: 'Eu', color: '#f5c842', emoji: '😺' },
      { id: uid(), name: 'Mãe', color: '#ff6b6b', emoji: '👩' },
      { id: uid(), name: 'Pai', color: '#6bcbf5', emoji: '👨' }
    ];
  }
  if (!data.categories?.length) {
    data.categories = [
      { id: uid(), name: 'Alimentação', emoji: '🍕', color: '#fb923c' },
      { id: uid(), name: 'Transporte', emoji: '🚗', color: '#6bcbf5' },
      { id: uid(), name: 'Saúde', emoji: '💊', color: '#4ade80' },
      { id: uid(), name: 'Lazer', emoji: '🎮', color: '#a78bfa' },
      { id: uid(), name: 'Compras', emoji: '🛍️', color: '#f5c842' },
      { id: uid(), name: 'Mercado', emoji: '🛒', color: '#34d399' }
    ];
  }
  if (!data.cards) data.cards = [];
  if (!data.expenses) data.expenses = [];
  save();
}

function save() {
  localStorage.setItem('gatofinance', JSON.stringify(data));
}

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ===================== NAVIGATION =====================
let currentPage = 'dashboard';
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');

  const titles = {
    dashboard: 'Dashboard',
    expenses: 'Gastos',
    cards: 'Cartões',
    people: 'Pessoas',
    categories: 'Categorias'
  };

  document.getElementById('topbarTitle').textContent = titles[page] || page;
  closeSidebar();

  const pages = {
    dashboard: renderDashboard,
    expenses: renderExpenses,
    cards: renderCards,
    people: renderPeople,
    categories: renderCategories
  };

  pages[page]?.();
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = `<button class="btn btn-primary" onclick="openAddExpense()">+ Novo Gasto</button>`;

  const monthExp = getMonthExpenses();
  const totalSpent = monthExp.reduce((s, e) => s + e.amount, 0);
  const totalLimit = data.cards.reduce((s, c) => s + (c.limit || 0), 0);
  const totalCards = data.cards.length;
  const uniquePeople = [...new Set(monthExp.map(e => e.personId))].length;

  // By person
  const byPerson = {};
  monthExp.forEach(e => {
    byPerson[e.personId] = (byPerson[e.personId] || 0) + e.amount;
  });

  // By category
  const byCat = {};
  monthExp.forEach(e => {
    byCat[e.categoryId] = (byCat[e.categoryId] || 0) + e.amount;
  });

  const sortedCats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0, 6);
  const maxCat = sortedCats[0]?.[1] || 1;

  const html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <div class="month-nav">
        <button class="btn btn-ghost btn-icon" onclick="prevMonth()">◀</button>
        <span>${monthName(currentMonth)} ${currentYear}</span>
        <button class="btn btn-ghost btn-icon" onclick="nextMonth()">▶</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card yellow">
        <div class="stat-label">Total Gasto</div>
        <div class="stat-value">${fmt(totalSpent)}</div>
        <div class="stat-sub">${monthExp.length} transações</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Limite Total</div>
        <div class="stat-value">${fmt(totalLimit)}</div>
        <div class="stat-sub">${totalCards} cartão(ões)</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Disponível</div>
        <div class="stat-value" style="color:${totalLimit - totalSpent < 0 ? 'var(--red)' : 'var(--green)'}">${fmt(Math.max(0, totalLimit - totalSpent))}</div>
        <div class="stat-sub">${totalLimit > 0 ? Math.round(totalSpent/totalLimit*100) : 0}% usado</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Pessoas Ativas</div>
        <div class="stat-value">${uniquePeople}</div>
        <div class="stat-sub">de ${data.people.length} cadastradas</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" class="two-col">

      <!-- Gastos por pessoa -->
      <div class="chart-container">
        <div class="section-header">
          <span class="section-title">👥 Por Pessoa</span>
        </div>
        <div class="bar-chart">
          ${data.people.map(p => {
            const amt = byPerson[p.id] || 0;
            const pct = totalSpent > 0 ? (amt/totalSpent*100) : 0;
            return `
              <div class="bar-row">
                <div class="bar-label"><span class="dot" style="background:${p.color}"></span> ${p.emoji} ${p.name}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${p.color}"></div></div>
                <div class="bar-amount">${fmt(amt)}</div>
              </div>
            `;
          }).join('') || '<div style="color:var(--text3);font-size:13px;padding:16px 0;">Nenhum gasto registrado</div>'}
        </div>
      </div>

      <!-- Gastos por categoria -->
      <div class="chart-container">
        <div class="section-header">
          <span class="section-title">🏷️ Por Categoria</span>
        </div>
        <div class="bar-chart">
          ${sortedCats.map(([catId, amt]) => {
            const cat = data.categories.find(c => c.id === catId);
            if (!cat) return '';
            const pct = amt/maxCat*100;
            return `
              <div class="bar-row">
                <div class="bar-label">${cat.emoji} ${cat.name}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
                <div class="bar-amount">${fmt(amt)}</div>
              </div>
            `;
          }).join('') || '<div style="color:var(--text3);font-size:13px;padding:16px 0;">Nenhum gasto registrado</div>'}
        </div>
      </div>
    </div>

    <!-- Últimos gastos -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">🕐 Últimos Gastos</span>
        <button class="btn btn-ghost btn-sm" onclick="showPage('expenses')">Ver todos →</button>
      </div>
      ${renderExpenseTable(monthExp.slice(-10).reverse(), true)}

  `;

  document.getElementById('pageContent').innerHTML = html;

  // Style two-col for mobile
  const twoCol = document.querySelector('.two-col');
  if (twoCol && window.innerWidth < 768) {
    twoCol.style.gridTemplateColumns = '1fr';
  }

let expFilter = { card: '', person: '', category: '', search: '' };

function renderExpenses() {
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = `<button class="btn btn-primary" onclick="openAddExpense()">+ Novo Gasto</button>`;

  const monthExp = getMonthExpenses();
  const filtered = filterExpenses(monthExp);

  document.getElementById('pageContent').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div class="month-nav">
        <button class="btn btn-ghost btn-icon" onclick="prevMonth()">◀</button>
        <span>${monthName(currentMonth)} ${currentYear}</span>
        <button class="btn btn-ghost btn-icon" onclick="nextMonth()">▶</button>
      </div>
      <div class="views-tabs">
        <button class="view-tab active" id="tab-all" onclick="setExpView('all')">Todos</button>
        <button class="view-tab" id="tab-person" onclick="setExpView('person')">Por Pessoa</button>
        <button class="view-tab" id="tab-card" onclick="setExpView('card')">Por Cartão</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-filters">
        <input class="filter-input" placeholder="🔍 Buscar..." oninput="expFilter.search=this.value;refreshExpenses()" value="${expFilter.search}">
        <select class="filter-input" onchange="expFilter.card=this.value;refreshExpenses()">
          <option value="">Todos os cartões</option>
          ${data.cards.map(c => `<option value="${c.id}" ${expFilter.card===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <select class="filter-input" onchange="expFilter.person=this.value;refreshExpenses()">
          <option value="">Todas as pessoas</option>
          ${data.people.map(p => `<option value="${p.id}" ${expFilter.person===p.id?'selected':''}>${p.emoji} ${p.name}</option>`).join('')}
        </select>
        <select class="filter-input" onchange="expFilter.category=this.value;refreshExpenses()">
          <option value="">Todas as categorias</option>
          ${data.categories.map(c => `<option value="${c.id}" ${expFilter.category===c.id?'selected':''}>${c.emoji} ${c.name}</option>`).join('')}
        </select>
        ${(expFilter.card||expFilter.person||expFilter.category||expFilter.search)?`<button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ Limpar</button>`:''}
      </div>
      ${renderExpenseTable(filtered, false)}
    </div>

    <div style="padding:12px 20px;color:var(--text3);font-size:13px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);">
      ${filtered.length} gasto(s) · Total: <strong style="color:var(--text)">${fmt(filtered.reduce((s,e)=>s+e.amount,0))}</strong>
    </div>
  `;
}

let currentExpView = 'all';
function setExpView(v) {
  currentExpView = v;
  ['all','person','card'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===v);
  });
  refreshExpenses();
}

function clearFilters() {
  expFilter = { card: '', person: '', category: '', search: '' };
  renderExpenses();
}

function refreshExpenses() {
  const monthExp = getMonthExpenses();
  const filtered = filterExpenses(monthExp);
  const tableArea = document.querySelector('.table-wrap');
  if (!tableArea) return;

  const tableContent = tableArea.querySelector('table, .empty');
  if (tableContent) tableContent.remove();

  const filterDiv = tableArea.querySelector('.table-filters');
  filterDiv.insertAdjacentHTML('afterend', renderExpenseTableHTML(filtered, false));

  const footer = document.querySelector('.table-wrap + div');
  if (footer) {
    footer.innerHTML = `${filtered.length} gasto(s) · Total: <strong style="color:var(--text)">${fmt(filtered.reduce((s,e)=>s+e.amount,0))}</strong>`;
  }
}

function filterExpenses(exps) {
  return exps.filter(e => {
    if (expFilter.card && e.cardId !== expFilter.card) return false;
    if (expFilter.person && e.personId !== expFilter.person) return false;
    if (expFilter.category && e.categoryId !== expFilter.category) return false;
    if (expFilter.search) {
      const q = expFilter.search.toLowerCase();
      if (!e.description?.toLowerCase().includes(q) &&
          !getPersonName(e.personId).toLowerCase().includes(q) &&
          !getCategoryName(e.categoryId).toLowerCase().includes(q) &&
          !getCardName(e.cardId).toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b) => new Date(b.date) - new Date(a.date));
}

function renderExpenseTable(exps, mini) {
  return renderExpenseTableHTML(exps, mini);
}

function renderExpenseTableHTML(exps, mini) {
  if (!exps.length) {
    return `<div class="empty"><span class="empty-icon">💸</span><h3>Nenhum gasto encontrado</h3><p>Adicione seu primeiro gasto do mês</p></div>`;
  }

  return `<table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Descrição</th>
        ${mini ? '' : '<th>Cartão</th>'}
        <th>Pessoa</th>
        <th>Categoria</th>
        <th>Valor</th>
        ${mini ? '' : '<th></th>'}
      </tr>
    </thead>
    <tbody>
      ${exps.map(e => {
        const person = data.people.find(p => p.id === e.personId);
        const cat = data.categories.find(c => c.id === e.categoryId);
        const card = data.cards.find(c => c.id === e.cardId);
        const dateStr = e.date ? new Date(e.date + 'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '—';
        const installInfo = e.installments > 1 ? `<span class="tag installment" style="margin-left:6px;">📅 ${e.installmentIndex}/${e.installments}</span>` : '';
        return `<tr>
          <td style="color:var(--text3);font-size:13px;">${dateStr}</td>
          <td>${e.description || '—'}${installInfo}</td>
          ${mini ? '' : `<td><span class="tag">${card?.name || '—'}</span></td>`}
          <td>${person ? `<span class="person-badge" style="background:${person.color}22;color:${person.color};border:1px solid ${person.color}44">${person.emoji} ${person.name}</span>` : '—'}</td>
          <td>${cat ? `<span class="tag">${cat.emoji} ${cat.name}</span>` : '—'}</td>
          <td class="amount-cell">${fmt(e.amount)}</td>
          ${mini ? '' : `<td><button class="btn btn-danger btn-sm btn-icon" onclick="deleteExpense('${e.id}')">🗑</button></td>`}
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function renderCards() {
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = `<button class="btn btn-primary" onclick="openAddCard()">+ Novo Cartão</button>`;

  const monthExp = getMonthExpenses();

  const html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div class="month-nav">
        <button class="btn btn-ghost btn-icon" onclick="prevMonth()">◀</button>
        <span>${monthName(currentMonth)} ${currentYear}</span>
        <button class="btn btn-ghost btn-icon" onclick="nextMonth()">▶</button>
      </div>
    </div>
    ${data.cards.length === 0 ? `
      <div class="empty">
        <span class="empty-icon">💳</span>
        <h3>Nenhum cartão cadastrado</h3>
        <p>Adicione seus cartões para começar a controlar os gastos</p>
        <br>
        <button class="btn btn-primary" onclick="openAddCard()">+ Adicionar Cartão</button>
      </div>
    ` : `
      <div class="cards-grid">
        ${data.cards.map(card => {
          const spent = monthExp.filter(e => e.cardId === card.id).reduce((s,e) => s+e.amount, 0);
          const pct = card.limit > 0 ? Math.min(spent/card.limit*100, 100) : 0;
          const cls = pct < 60 ? 'low' : pct < 85 ? 'mid' : 'high';
          return `
            <div class="credit-card">
              <div class="card-header">
                <div class="card-name">${card.name}</div>
                <div class="card-actions">
                  <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditCard('${card.id}')">✏️</button>
                  <button class="btn btn-danger btn-sm btn-icon" onclick="deleteCard('${card.id}')">🗑</button>
                </div>
              </div>
              <div class="card-spent">${fmt(spent)}</div>
              <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">gasto de ${fmt(card.limit || 0)} de limite</div>
              <div class="card-info">
                <div class="card-info-item">
                  <label>Vencimento</label>
                  <span>Dia ${card.dueDay || '—'}</span>
                </div>
                <div class="card-info-item">
                  <label>Fechamento</label>
                  <span>Dia ${card.closeDay || '—'}</span>
                </div>
              </div>
              <div class="progress-bar">
                <div class="progress-fill ${cls}" style="width:${pct}%"></div>
              </div>
              <div class="card-progress-info">
                <span>${Math.round(pct)}% utilizado</span>
                <span>Disponível: ${fmt(Math.max(0,(card.limit||0)-spent))}</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;

  document.getElementById('pageContent').innerHTML = html;
}

function renderPersonBreakdown() {
  const monthExp = getMonthExpenses();
  if (!monthExp.length) return `<div style="color:var(--text3);font-size:13px;">Nenhum gasto neste mês.</div>`;

  return data.people.map(p => {
    const exps = monthExp.filter(e => e.personId === p.id);
    if (!exps.length) return '';
    const total = exps.reduce((s,e) => s+e.amount, 0);
    return `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <span class="dot" style="background:${p.color};width:12px;height:12px;"></span>
          <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;">${p.emoji} ${p.name}</span>
          <span style="margin-left:auto;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;">${fmt(total)}</span>
        </div>
        ${exps.sort((a,b) => b.amount-a.amount).slice(0,5).map(e => {
          const cat = data.categories.find(c => c.id === e.categoryId);
          return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-size:13px;">
            <span>${e.description || '—'} ${cat?`<span class="tag" style="font-size:11px;">${cat.emoji} ${cat.name}</span>`:''}</span>
            <span style="font-weight:600;">${fmt(e.amount)}</span>
          </div>`;
        }).join('')}
        ${exps.length > 5 ? `<div style="font-size:12px;color:var(--text3);padding-top:8px;border-top:1px solid var(--border);">+${exps.length-5} gastos a mais</div>` : ''}
      </div>
    `;
  }).join('');
}

function addPerson() {
  const name = document.getElementById('newPersonName').value.trim();
  const emoji = document.getElementById('newPersonEmoji').value.trim() || '👤';
  const color = document.getElementById('newPersonColor').value;
  if (!name) return toast('Digite o nome da pessoa', '⚠️');
  data.people.push({ id: uid(), name, emoji, color });
  save();
  renderPeople();
  toast(`${emoji} ${name} adicionado(a)!`, '✅');
}

function deletePerson(id) {
  if (!confirm('Remover esta pessoa? Gastos associados serão mantidos.')) return;
  data.people = data.people.filter(p => p.id !== id);
  save();
  renderPeople();
  toast('Pessoa removida', '🗑');
}

  renderCategories();

}

    <div class="form-row">
      <div class="form-group">
        <label>Quem gastou</label>
        <select id="expPerson">
          <option value="">Selecionar...</option>
          ${data.people.map(p => `<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="expCat">
          <option value="">Selecionar...</option>
          ${data.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Parcelas</label>
        <select id="expInstallments">
          <option value="1">À vista</option>
          ${Array.from({length:23},(_,i)=>`<option value="${i+2}">${i+2}x</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Valor por parcela</label>
        <input type="text" id="expInstPreview" disabled placeholder="—" style="color:var(--accent);">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveExpense()">Salvar Gasto</button>
    </div>
  `;
  openModal(html);

  // Preview installment value
  setTimeout(() => {
    const amtInput = document.getElementById('expAmount');
    const instSelect = document.getElementById('expInstallments');
    const preview = document.getElementById('expInstPreview');
    function update() {
      const amt = parseFloat(amtInput.value) || 0;
      const inst = parseInt(instSelect.value) || 1;
      if (amt && inst > 1) preview.value = fmt(amt/inst) + '/mês';
      else preview.value = '';
    }
    amtInput?.addEventListener('input', update);
    instSelect?.addEventListener('change', update);
  }, 100);
}

function saveExpense() {
  const desc = document.getElementById('expDesc').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const date = document.getElementById('expDate').value;
  const cardId = document.getElementById('expCard').value;
  const personId = document.getElementById('expPerson').value;
  const categoryId = document.getElementById('expCat').value;
  const installments = parseInt(document.getElementById('expInstallments').value) || 1;

  if (!amount || isNaN(amount)) return toast('Informe o valor', '⚠️');
  if (!cardId) return toast('Selecione o cartão', '⚠️');
  if (!personId) return toast('Selecione quem gastou', '⚠️');

  const groupId = uid();

  if (installments > 1) {
    const baseDate = new Date(date + 'T00:00:00');
    const perInstallment = amount / installments;
    for (let i = 0; i < installments; i++) {
      const d = new Date(baseDate);
      d.setMonth(d.getMonth() + i);
      const ds = d.toISOString().split('T')[0];
      data.expenses.push({
        id: uid(),
        groupId,
        description: desc,
        amount: Math.round(perInstallment * 100) / 100,
        date: ds,
        cardId, personId, categoryId,
        installments,
        installmentIndex: i + 1
      });
    }
    toast(`${installments} parcelas adicionadas!`, '✅');
  } else {
    data.expenses.push({
      id: uid(),
      groupId,
      description: desc,
      amount: Math.round(amount * 100) / 100,
      date, cardId, personId, categoryId,
      installments: 1,
      installmentIndex: 1
    });
    toast('Gasto adicionado!', '✅');
  }

  save();
  closeModal();
  showPage(currentPage);
}

function deleteExpense(id) {
  const exp = data.expenses.find(e => e.id === id);
  if (!exp) return;
  if (exp.installments > 1 && exp.groupId) {
    const siblings = data.expenses.filter(e => e.groupId === exp.groupId);
    if (siblings.length > 1) {
      if (!confirm(`Este é um gasto parcelado (${siblings.length} parcelas). Deseja apagar TODAS as parcelas?`)) {
        data.expenses = data.expenses.filter(e => e.id !== id);
        save(); showPage(currentPage); return;
      }
      data.expenses = data.expenses.filter(e => e.groupId !== exp.groupId);
    } else {
      data.expenses = data.expenses.filter(e => e.id !== id);
    }
  } else {
    if (!confirm('Apagar este gasto?')) return;
    data.expenses = data.expenses.filter(e => e.id !== id);
  }
  save();
  toast('Gasto removido', '🗑');
  showPage(currentPage);
}

// ADD CARD
function openAddCard() {
  openCardModal();
}

function openEditCard(id) {
  const card = data.cards.find(c => c.id === id);
  openCardModal(card);
}

function openCardModal(card = null) {
  const isEdit = !!card;
  const html = `
    <h2>${isEdit ? '✏️ Editar' : '💳 Novo'} Cartão</h2>
    <div class="form-group">
      <label>Nome do Cartão</label>
      <input type="text" id="cardName" placeholder="Ex: Nubank, Inter, Itaú..." value="${card?.name || ''}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Dia de Fechamento</label>
        <input type="number" id="cardCloseDay" placeholder="Ex: 12" min="1" max="31" value="${card?.closeDay || ''}">
      </div>
      <div class="form-group">
        <label>Dia de Vencimento</label>
        <input type="number" id="cardDueDay" placeholder="Ex: 19" min="1" max="31" value="${card?.dueDay || ''}">
      </div>
    </div>
    <div class="form-group">
      <label>Limite (R$)</label>
      <input type="number" id="cardLimit" placeholder="Ex: 5000" min="0" step="0.01" value="${card?.limit || ''}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCard('${card?.id || ''}')">Salvar</button>
    </div>
  `;
  openModal(html);
}

function saveCard(editId) {
  const name = document.getElementById('cardName').value.trim();
  const closeDay = parseInt(document.getElementById('cardCloseDay').value) || null;
  const dueDay = parseInt(document.getElementById('cardDueDay').value) || null;
  const limit = parseFloat(document.getElementById('cardLimit').value) || 0;

  if (!name) return toast('Informe o nome do cartão', '⚠️');

  if (editId) {
    const idx = data.cards.findIndex(c => c.id === editId);
    if (idx >= 0) data.cards[idx] = { ...data.cards[idx], name, closeDay, dueDay, limit };
    toast('Cartão atualizado!', '✅');
  } else {
    data.cards.push({ id: uid(), name, closeDay, dueDay, limit });
    toast('Cartão adicionado!', '✅');
  }

  save();
  closeModal();
  showPage(currentPage);
}

function deleteCard(id) {
  if (!confirm('Remover este cartão? Gastos associados serão mantidos.')) return;
  data.cards = data.cards.filter(c => c.id !== id);
  save();
  renderCards();
  toast('Cartão removido', '🗑');
}

// ===================== HELPERS =====================
function getMonthExpenses() {
  return data.expenses.filter(e => {
    if (!e.date) return false;
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  });
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  showPage(currentPage);
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  showPage(currentPage);
}

function monthName(m) {
  return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m];
}

function fmt(n) {
  return 'R$ ' + (n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getPersonName(id) { return data.people.find(p => p.id === id)?.name || ''; }
function getCategoryName(id) { return data.categories.find(c => c.id === id)?.name || ''; }
function getCardName(id) { return data.cards.find(c => c.id === id)?.name || ''; }

// SIDEBAR MOBILE
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('overlayBg');
  s.classList.toggle('open');
  o.style.display = s.classList.contains('open') ? 'block' : 'none';
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlayBg').style.display = 'none';
}

// TOAST
function toast(msg, icon = 'ℹ️') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `${icon} ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ===================== INIT =====================
load();
showPage('dashboard');
</script>
